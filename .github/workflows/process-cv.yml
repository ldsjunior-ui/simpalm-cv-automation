name: Process CV

on:
  push:
    paths:
      - 'inbox/**'

# Serialize all CV-processing runs — prevents concurrent push conflicts
concurrency:
  group: cv-processing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache apt packages (WeasyPrint system deps)
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info fonts-liberation fonts-dejavu
          version: 1.0

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Copy template
        run: |
          mkdir -p templates
          cp Templates/simpalm_cv_TEMPLATE.html templates/ 2>/dev/null || true

      - name: Detect new CV files
        id: detect
        run: |
          # Pull latest state first — queued runs need the current HEAD
          git pull --rebase origin main 2>/dev/null || true

          # Files changed in the triggering push
          git diff --name-only HEAD~1 HEAD -- 'inbox/**' \
            | grep -E '\.(pdf|docx|doc)$' > /tmp/new_cvs.txt || true

          # Fallback: if diff is empty, collect all inbox PDFs/DOCXs
          if [ ! -s /tmp/new_cvs.txt ]; then
            find inbox -type f \( -name "*.pdf" -o -name "*.docx" -o -name "*.doc" \) \
              | sort > /tmp/new_cvs.txt || true
          fi

          echo "Files to process:"
          cat /tmp/new_cvs.txt
          COUNT=$(grep -c . /tmp/new_cvs.txt 2>/dev/null || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Process each CV
        if: steps.detect.outputs.count > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          while IFS= read -r cv_file; do
            if [ -f "$cv_file" ]; then
              echo "──────────────────────────────────"
              echo "Processing: $cv_file"
              python scripts/process_cv.py "$cv_file"
            fi
          done < /tmp/new_cvs.txt

      - name: Commit processed PDFs and index
        if: steps.detect.outputs.count > 0
        run: |
          git config user.name  "Simpalm CV Bot"
          git config user.email "cv-bot@simpalmstaffing.com"
          git add processed/ index.json
          git diff --staged --quiet && echo "Nothing new to commit." && exit 0
          git commit -m "🤖 Auto-process CV batch [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $attempt failed — retrying in ${attempt}s..."
            sleep $attempt
          done
