name: Process CV

on:
  push:
    paths:
      - 'inbox/**'

# Serialize all CV-processing runs — prevents concurrent push conflicts
concurrency:
  group: cv-processing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Copy template
        run: |
          mkdir -p templates
          cp Templates/simpalm_cv_TEMPLATE.html templates/ 2>/dev/null || true

      - name: Detect new CV files
        id: detect
        run: |
          # Pull latest state first (queued runs need current HEAD)
          git pull --rebase origin main 2>/dev/null || true

          # Files added in the triggering push
          git diff --name-only HEAD~1 HEAD -- 'inbox/**' | \
            grep -E '\.(pdf|docx|doc)$' > /tmp/new_cvs.txt || true

          # Fallback: all inbox files not yet in index.json
          if [ ! -s /tmp/new_cvs.txt ]; then
            python3 - << 'PYEOF'
import json, pathlib
idx_path = pathlib.Path('index.json')
idx = json.loads(idx_path.read_text()) if idx_path.exists() else []
processed = {e.get('filename','') for e in idx}
for f in sorted(pathlib.Path('inbox').iterdir()):
    if f.suffix.lower() in ('.pdf', '.docx', '.doc'):
        candidate_out = f.stem.split(' - CV Simpalm')[0].strip() + ' - CV Simpalm Staffing.pdf'
        if candidate_out not in processed:
            print(f)
PYEOF
            > /tmp/new_cvs.txt || true
          fi

          echo "Files to process:"
          cat /tmp/new_cvs.txt
          COUNT=$(grep -c . /tmp/new_cvs.txt 2>/dev/null || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Process each CV
        if: steps.detect.outputs.count > 0
        run: |
          while IFS= read -r cv_file; do
            if [ -f "$cv_file" ]; then
              echo "──────────────────────────────────"
              echo "Processing: $cv_file"
              python scripts/process_cv.py "$cv_file"
            fi
          done < /tmp/new_cvs.txt

      - name: Commit processed PDFs and index
        if: steps.detect.outputs.count > 0
        run: |
          git config user.name  "Simpalm CV Bot"
          git config user.email "cv-bot@simpalmstaffing.com"
          git add processed/ index.json
          git diff --staged --quiet && echo "Nothing new to commit." && exit 0
          git commit -m "🤖 Auto-process CV batch [skip ci]"
          # Retry push up to 3 times — handles sequencing edge cases
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $attempt failed — retrying in ${attempt}s..."
            sleep $attempt
          done
